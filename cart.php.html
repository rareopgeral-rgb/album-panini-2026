    function num(v){return Number(v||0);}
    function brl(v){return Number(v||0).toFixed(2).replace('.',',');}
    function getCarrinho(){return JSON.parse(localStorage.getItem('carrinho')||'[]');}
    function setCarrinho(c){
      localStorage.setItem('carrinho',JSON.stringify(c));
      sessionStorage.setItem('checkoutCarrinho',JSON.stringify(c));
    }

    function resolverImagem(item) {
      if (item.imagem && /\.(png|jpe?g|webp|gif)(\?|$)/i.test(item.imagem)) return item.imagem;
      if (item.produtoId) {
        const p = PRODUTOS.find(x => String(x.id) === String(item.produtoId));
        if (p) {
          if (item.variacaoId && p.variacoes) {
            const v = p.variacoes.find(x => String(x.id) === String(item.variacaoId));
            if (v && v.imagem) return v.imagem;
          }
          return p.imagem || (p.fotos && p.fotos[0]);
        }
      }
      return item.imagem || '';
    }

    function renderCarrinho() {
      const c = getCarrinho();
      const wrap = document.getElementById('cartItems');
      const vazio = document.getElementById('cartVazio');
      const containerWrap = document.getElementById('cartItemsWrap');

      if (!c.length) {
        wrap.innerHTML = '';
        vazio.classList.remove('hidden');
        containerWrap.classList.remove('border');
      } else {
        vazio.classList.add('hidden');
        containerWrap.classList.add('border');
        wrap.innerHTML = '';
        c.forEach((it, idx) => {
          const qtd = Math.max(1, Number(it.quantidade||1));
          const precoComp = num(it.precoComparacao) || num(it.preco);
          const desconto = precoComp > num(it.preco) ? Math.round((1 - num(it.preco)/precoComp)*100) : 0;
          const div = document.createElement('div');
          div.className = 'cart-item';
          div.innerHTML = `
            <img src="${resolverImagem(it)}.html" class="cart-thumb" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=='">
            <div>
              <div class="text-sm font-semibold leading-tight">${it.titulo||''}</div>
              <div class="flex items-center gap-1 mt-1">
                ${desconto>0?`<span class="bg-rose-100 text-rose-600 text-[10px] font-bold px-1.5 py-0.5 rounded">- ${desconto}%</span>`:''}
                <span class="bg-green-100 text-green-700 text-[10px] font-bold px-1.5 py-0.5 rounded">Frete grátis</span>
              </div>
              <div class="text-rose-600 font-bold mt-1">R$ ${brl(it.preco)}</div>
              ${precoComp > num(it.preco)?`<div class="text-[11px] line-through text-gray-400">R$ ${brl(precoComp)}</div>`:''}
            </div>
            <div class="flex flex-col items-end gap-2">
              <button onclick="removerItem(${idx})" class="text-gray-400 hover:text-rose-600 text-lg leading-none">×</button>
              <div class="flex items-center border border-gray-200 rounded">
                <button onclick="alterarQtd(${idx},-1)" class="qty-btn">-</button>
                <input type="number" value="${qtd}" min="1" class="qty-input" onchange="alterarQtdDireto(${idx},this.value)">
                <button onclick="alterarQtd(${idx},1)" class="qty-btn">+</button>
              </div>
            </div>
          `;
          wrap.appendChild(div);
        });
      }

      const total = c.reduce((s,it)=>s + num(it.preco) * Math.max(1,Number(it.quantidade||1)), 0);
      document.getElementById('cartTotal').textContent = 'R$ ' + brl(total);
      const totalQtd = c.reduce((s,it)=>s + Math.max(1,Number(it.quantidade||1)), 0);
      document.getElementById('badge').textContent = totalQtd;
    }

    function alterarQtd(idx, d) {
      const c = getCarrinho();
      if (!c[idx]) return;
      c[idx].quantidade = Math.max(1, Number(c[idx].quantidade||1)+d);
      setCarrinho(c);
      renderCarrinho();
    }
    function alterarQtdDireto(idx,v) {
      const c = getCarrinho();
      if (!c[idx]) return;
      let q = parseInt(v,10); if (!q||q<1) q=1;
      c[idx].quantidade = q;
      setCarrinho(c);
      renderCarrinho();
    }
    function removerItem(idx) {
      const c = getCarrinho();
      c.splice(idx,1);
      setCarrinho(c);
      renderCarrinho();
    }
    function esvaziar() {
      if (!getCarrinho().length) return;
      if (!confirm('Esvaziar carrinho?')) return;
      setCarrinho([]);
      renderCarrinho();
    }

    function renderRecomendados() {
      const wrap = document.getElementById('recomendados');
      wrap.innerHTML = '';
      const c = getCarrinho();
      const idsNoCart = new Set(c.map(i=>String(i.produtoId)));
      // Onda 93.120.1: apenas 1 card grande, estilo vazosdebarro
      const rec = PRODUTOS.filter(p => !idsNoCart.has(String(p.id)))[0];
      if (!rec) return;
      const a = document.createElement('a');
      a.className = 'rel-big';
      a.href = 'produto.php?produto_id=' + encodeURIComponent(rec.id);
      a.innerHTML = `
        <img src="${rec.imagem||''}.html" class="rel-big-img" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=='">
        <div class="rel-big-title">${rec.titulo}</div>
        <div class="rel-big-chips">
          <span class="bg-rose-100 text-rose-600 text-[10px] font-bold px-1.5 py-0.5 rounded">60% OFF</span>
          <span class="bg-green-100 text-green-700 text-[10px] font-bold px-1.5 py-0.5 rounded">Frete grátis</span>
        </div>
        <div class="rel-big-meta">★ ${rec.notas||'4.7'} | ${rec.quantidade_produtos||4312} vendido(s)</div>
        <div class="rel-big-price">R$ ${brl(rec.preco)}</div>
        ${rec.preco_comparacao ? `<div class="rel-big-old">R$ ${brl(rec.preco_comparacao)}</div>` : ''}
      `;
      wrap.appendChild(a);
    }

    renderCarrinho();
    renderRecomendados();

    if (window.ttq) {
      try { window.ttq.track('ViewCart'); } catch(e){}
    }
  </script>
